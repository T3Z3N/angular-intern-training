<h2 class="title">User List</h2>

<div class="user-container">

  <div
    class="user-card"
    *ngFor="let user of (users$ | async)"
    (click)="openUser(user.id)"
  >
    <img [src]="user.image || 'https://i.pravatar.cc/150'" class="avatar" />

    <div class="info">
      <h3>{{ user.firstName }} {{ user.lastName }}</h3>
      <p>{{ user.email }}</p>
      <p>{{ user.phone }}</p>
    </div>

  </div>

</div>
